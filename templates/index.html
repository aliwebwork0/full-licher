<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Licher — Transfer Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #03070d;
  --bg2:       #060d16;
  --s1:        #0a1420;
  --s2:        #0d1a28;
  --s3:        #111f30;
  --border:    #152030;
  --border2:   #1e3048;
  --text:      #c8d8e8;
  --muted:     #3d5570;
  --muted2:    #567090;
  --cyan:      #00e5ff;
  --cyan2:     #00b8d4;
  --green:     #00ff9d;
  --green2:    #00c87a;
  --purple:    #a855f7;
  --orange:    #ff6b35;
  --red:       #ff3366;
  --yellow:    #ffd166;
  --mono:      'Space Mono', monospace;
  --sans:      'Space Grotesk', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  padding: 0 0 100px;
  overflow-x: hidden;
}

/* ── Noise texture overlay ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: 0.6;
}

/* ── Grid lines ── */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none; z-index: 0;
}

.wrap {
  position: relative; z-index: 1;
  width: 100%; max-width: 780px;
  margin: 0 auto;
  padding: 0 16px;
  display: flex; flex-direction: column; gap: 16px;
}

/* ══════════════════════════════════════
   HEADER
══════════════════════════════════════ */
header {
  display: flex; align-items: center; gap: 0;
  padding: 28px 0 8px;
}

.logo-block {
  display: flex; align-items: center; gap: 14px;
  flex: 1;
}

.logo-icon {
  width: 48px; height: 48px; position: relative; flex-shrink: 0;
}
.logo-icon svg { width: 100%; height: 100%; }

.logo-text-group { display: flex; flex-direction: column; gap: 1px; }

.logo-name {
  font-family: var(--mono);
  font-size: 22px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  background: linear-gradient(120deg, var(--cyan), var(--green));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logo-tagline {
  font-size: 9px; font-family: var(--mono);
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--muted2);
}

.header-right {
  display: flex; align-items: center; gap: 10px;
}

.status-pill {
  display: flex; align-items: center; gap: 6px;
  font-size: 9px; font-family: var(--mono);
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--green2);
  border: 1px solid rgba(0,255,157,0.2);
  padding: 5px 12px; border-radius: 20px;
  background: rgba(0,255,157,0.04);
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: blink 2s ease-in-out infinite;
}



/* ══════════════════════════════════════
   INPUT CARD
══════════════════════════════════════ */
.card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
}

.card-head {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,229,255,0.02);
}
.card-head-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--cyan); box-shadow: 0 0 8px var(--cyan);
}
.card-head-title {
  font-size: 9px; font-family: var(--mono);
  letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--muted2);
  flex: 1;
}

.card-body { padding: 18px; display: flex; flex-direction: column; gap: 14px; }

/* source type tabs */
.source-tabs {
  display: flex; gap: 6px;
}
.source-tab {
  flex: 1; padding: 8px 10px;
  background: var(--s2); border: 1px solid var(--border2);
  border-radius: 8px; cursor: pointer;
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted2);
  transition: all .2s; text-align: center;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.source-tab:hover { border-color: var(--border2); color: var(--text); }
.source-tab.active {
  background: rgba(0,229,255,0.08);
  border-color: rgba(0,229,255,0.4);
  color: var(--cyan);
}
.source-tab.yt.active {
  background: rgba(255,59,59,0.08);
  border-color: rgba(255,59,59,0.4);
  color: #ff3b3b;
}
.source-tab.ig.active {
  background: rgba(168,85,247,0.08);
  border-color: rgba(168,85,247,0.4);
  color: var(--purple);
}

/* fields */
.field { display: flex; flex-direction: column; gap: 6px; }
.field-label {
  font-size: 9px; font-family: var(--mono);
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted2);
}

.input-wrap { position: relative; }
.input-ico {
  position: absolute; left: 13px; top: 50%;
  transform: translateY(-50%);
  font-size: 13px; color: var(--muted); pointer-events: none;
}
.input-action {
  position: absolute; right: 10px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--muted2); font-size: 11px;
  font-family: var(--mono); letter-spacing: 1px;
  padding: 4px 8px; border-radius: 4px;
  transition: color .2s;
}
.input-action:hover { color: var(--cyan); }

input[type=text], input[type=url], select {
  width: 100%; background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text);
  font-family: var(--mono); font-size: 12px;
  padding: 11px 13px 11px 38px; outline: none;
  transition: border-color .2s, box-shadow .2s;
  -webkit-appearance: none;
}
input:focus, select:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
}
input::placeholder { color: var(--muted); }

select { padding-left: 13px; background-image: none; }

/* destination row */
.dest-row {
  display: flex; gap: 8px; align-items: flex-end;
}
.dest-row .field { flex: 1; }
.btn-browse {
  height: 40px; padding: 0 14px;
  background: rgba(0,229,255,0.06);
  border: 1px solid rgba(0,229,255,0.25);
  border-radius: 8px; cursor: pointer;
  color: var(--cyan); font-family: var(--mono);
  font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
  transition: all .2s; white-space: nowrap; flex-shrink: 0;
}
.btn-browse:hover {
  background: rgba(0,229,255,0.12);
  border-color: rgba(0,229,255,0.5);
}

/* quality selector (yt only) */
.quality-row { display: none; }
.quality-row.visible { display: flex; gap: 6px; flex-wrap: wrap; }
.q-btn {
  padding: 6px 14px;
  background: var(--s2); border: 1px solid var(--border2);
  border-radius: 6px; cursor: pointer;
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted2); transition: all .2s;
}
.q-btn:hover { color: var(--text); }
.q-btn.active {
  background: rgba(255,59,59,0.1);
  border-color: rgba(255,59,59,0.4);
  color: #ff3b3b;
}

/* probe badge */
.probe-info {
  display: none;
  padding: 8px 12px;
  background: rgba(0,229,255,0.05);
  border: 1px solid rgba(0,229,255,0.15);
  border-radius: 8px;
  font-family: var(--mono); font-size: 10px;
  color: var(--muted2); gap: 14px;
  flex-wrap: wrap;
}
.probe-info.visible { display: flex; }
.probe-item span { color: var(--text); margin-left: 4px; }

/* start button */
.btn-start {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--cyan) 0%, var(--green) 100%);
  border: none; border-radius: 10px;
  color: #000; font-family: var(--mono);
  font-size: 11px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer;
  transition: opacity .2s, transform .1s, box-shadow .2s;
  margin-top: 2px;
  box-shadow: 0 0 20px rgba(0,229,255,0.15);
}
.btn-start:hover {
  opacity: .9;
  box-shadow: 0 0 30px rgba(0,229,255,0.3);
}
.btn-start:active { transform: scale(.99); }
.btn-start:disabled { opacity: .3; cursor: not-allowed; transform: none; box-shadow: none; }
.spin {
  width: 13px; height: 13px;
  border: 2px solid rgba(0,0,0,.2); border-top-color: #000;
  border-radius: 50%; animation: spin .7s linear infinite; display: none;
}
.btn-start.loading .spin { display: block; }
.btn-start.loading .lbl { display: none; }

/* ══════════════════════════════════════
   JOBS
══════════════════════════════════════ */
.jobs-toolbar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 10px 18px;
  border-bottom: 1px solid var(--border);
}
.toolbar-title {
  font-size: 9px; font-family: var(--mono);
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted2); flex: 1;
}

/* total transferred strip */
.jobs-total-strip {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 18px 10px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,229,255,0.03);
}
.jobs-total-label {
  font-size: 9px; font-family: var(--mono);
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted);
}
.jobs-total-val {
  font-family: var(--mono); font-weight: 700; font-size: 18px;
  background: linear-gradient(120deg, var(--cyan), var(--green));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.jobs-total-sub {
  font-family: var(--mono); font-size: 10px; color: var(--muted2);
  text-align: right;
}

.btn-sm {
  background: none; border: 1px solid var(--border2); color: var(--muted2);
  font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
  text-transform: uppercase; padding: 5px 11px; border-radius: 6px;
  cursor: pointer; transition: color .2s, border-color .2s, background .2s;
}
.btn-sm:hover { color: var(--text); border-color: var(--muted); }
.btn-sm.danger:hover { color: var(--red); border-color: var(--red); }
.btn-sm.warn:hover   { color: var(--yellow); border-color: var(--yellow); }

.jobs-list { display: flex; flex-direction: column; gap: 3px; padding: 10px; }

/* ── Job Item ── */
/* ═══════════════════════════════════
   JOB CARD — new circular design
═══════════════════════════════════ */
.job-item {
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
  transition: border-color .25s, box-shadow .25s;
}
.job-item:hover { border-color: var(--border2); }
.job-item.is-running {
  border-color: rgba(0,229,255,0.25);
  box-shadow: 0 0 0 1px rgba(0,229,255,0.06) inset;
}
.job-item.is-done    { border-color: rgba(0,255,157,0.2); }
.job-item.is-failed  { border-color: rgba(255,51,102,0.2); }
.job-item.is-queued  { border-color: rgba(86,112,144,0.2); }

/* ── main row ── */
.job-row {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px; cursor: pointer;
}

/* ── left: icon block ── */
.job-status-icon {
  width: 34px; height: 34px; flex-shrink: 0;
  border-radius: 10px; display: grid; place-items: center;
  font-size: 14px; position: relative;
}
.job-status-icon.queued    { background: rgba(61,85,112,.2);      color: var(--muted2); }
.job-status-icon.running   { background: rgba(0,229,255,0.1);     color: var(--cyan); }
.job-status-icon.done      { background: rgba(0,255,157,0.12);    color: var(--green); }
.job-status-icon.failed    { background: rgba(255,51,102,0.1);    color: var(--red); }
.job-status-icon.cancelled { background: rgba(255,209,102,0.08);  color: var(--yellow); }

.job-status-icon.running::after {
  content: '';
  position: absolute; inset: -3px; border-radius: 13px;
  border: 1.5px solid var(--cyan);
  animation: ring-pulse 1.5s ease-in-out infinite;
}

/* ── center: info ── */
.job-info {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; gap: 5px;
}
.job-name {
  font-size: 13px; font-weight: 600;
  color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* transferred amount row */
.job-transfer-row {
  display: flex; align-items: baseline; gap: 6px;
  font-family: var(--mono); font-size: 11px;
}
.job-recv  { color: var(--cyan); font-weight: 700; font-size: 13px; }
.job-sep   { color: var(--muted); }
.job-total { color: var(--muted2); }

/* speed + eta row */
.job-meta-row {
  display: flex; gap: 10px; flex-wrap: wrap;
  font-family: var(--mono); font-size: 10px; color: var(--muted2);
}
.job-speed { color: var(--cyan); }
.job-eta   { color: var(--muted2); }
.job-src-badge {
  font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
  padding: 1px 6px; border-radius: 4px;
  background: rgba(86,112,144,0.15); color: var(--muted2);
}

/* ── right: circular progress ── */
.job-circle-wrap {
  flex-shrink: 0; position: relative;
  width: 56px; height: 56px;
  display: flex; align-items: center; justify-content: center;
}
.job-circle-wrap svg {
  position: absolute; inset: 0;
  transform: rotate(-90deg);
}
.job-circle-track {
  fill: none;
  stroke: var(--border2);
  stroke-width: 3.5;
}
.job-circle-fill {
  fill: none;
  stroke-width: 3.5;
  stroke-linecap: round;
  transition: stroke-dashoffset .7s cubic-bezier(.4,0,.2,1),
              stroke .3s;
}
.job-item.is-running  .job-circle-fill { stroke: url(#circleGrad); }
.job-item.is-done     .job-circle-fill { stroke: var(--green); }
.job-item.is-failed   .job-circle-fill { stroke: var(--red); }
.job-item.is-queued   .job-circle-fill { stroke: var(--muted); }
.job-item.is-cancelled .job-circle-fill { stroke: var(--yellow); }

.job-circle-label {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  gap: 0;
}
.job-circle-pct {
  font-family: var(--mono); font-size: 13px; font-weight: 700;
  color: var(--cyan); line-height: 1;
}
.job-item.is-done     .job-circle-pct { color: var(--green); }
.job-item.is-failed   .job-circle-pct { color: var(--red); }
.job-item.is-queued   .job-circle-pct { color: var(--muted2); }
.job-item.is-cancelled .job-circle-pct { color: var(--yellow); }

.job-circle-status {
  font-size: 7px; font-family: var(--mono);
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted); margin-top: 1px;
}

/* ── badge strip ── */
.job-badge-row {
  display: flex; align-items: center; gap: 8px;
  padding: 0 16px 12px;
  margin-top: -4px;
}
.job-badge {
  font-size: 8px; font-family: var(--mono);
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 3px 9px; border-radius: 20px; font-weight: 700;
}
.b-queued    { background: rgba(61,85,112,.15);    color: var(--muted2); }
.b-running   { background: rgba(0,229,255,.1);     color: var(--cyan); }
.b-done      { background: rgba(0,255,157,.1);     color: var(--green); }
.b-failed    { background: rgba(255,51,102,.12);   color: var(--red); }
.b-cancelled { background: rgba(255,209,102,.08);  color: var(--yellow); }

.retry-badge-inline {
  font-size: 9px; font-family: var(--mono);
  color: var(--orange); margin-left: auto;
}

/* ── thin progress bar at very bottom (secondary) ── */
.job-progress {
  height: 2px; background: var(--border);
}
.job-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--green));
  transition: width .7s cubic-bezier(.4,0,.2,1);
}
.job-item.is-running .job-progress-fill {
  box-shadow: 0 0 8px rgba(0,229,255,0.6);
}
.job-item.is-failed    .job-progress-fill { background: var(--red); }
.job-item.is-cancelled .job-progress-fill { background: var(--yellow); }
.job-item.is-done      .job-progress-fill { background: var(--green); }

/* ── expand detail ── */
.job-detail {
  display: none;
  border-top: 1px solid var(--border);
}
.job-detail.open { display: block; }

.job-actions {
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,.2);
}
.job-time-info {
  margin-left: auto;
  font-size: 9px; font-family: var(--mono);
  color: var(--muted); letter-spacing: 1px;
}

/* log terminal */
.log-wrap { position: relative; }
.log-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 14px;
  background: rgba(0,0,0,.3);
  border-bottom: 1px solid var(--border);
}
.log-bar-title {
  font-size: 8px; font-family: var(--mono);
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted);
}
.log-out {
  background: var(--bg2);
  font-family: var(--mono); font-size: 11px;
  color: var(--muted2); line-height: 1.7;
  padding: 12px 14px;
  max-height: 160px; overflow-y: auto;
  white-space: pre-wrap; word-break: break-all;
}
.log-out::-webkit-scrollbar { width: 4px; }
.log-out::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.le { color: var(--red); }
.lw { color: var(--yellow); }
.lo { color: var(--green); }
.lr { color: var(--purple); }

/* ══════════════════════════════════════
   MEGA BROWSER MODAL
══════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 999;
  background: rgba(3,7,13,0.9);
  backdrop-filter: blur(6px);
  display: none; align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--s1);
  border: 1px solid var(--border2);
  border-radius: 16px; overflow: hidden;
  width: 100%; max-width: 540px;
  max-height: 80vh; display: flex; flex-direction: column;
  box-shadow: 0 0 60px rgba(0,229,255,0.08), 0 30px 80px rgba(0,0,0,.6);
}

.modal-head {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,229,255,0.03);
}
.modal-title {
  font-size: 11px; font-family: var(--mono);
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--cyan); flex: 1;
}
.modal-path {
  font-size: 10px; font-family: var(--mono);
  color: var(--muted2); flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.btn-modal-close {
  background: none; border: none; cursor: pointer;
  color: var(--muted2); font-size: 18px; line-height: 1;
  padding: 2px 6px; border-radius: 4px;
  transition: color .2s;
}
.btn-modal-close:hover { color: var(--red); }

.modal-body { flex: 1; overflow-y: auto; padding: 8px; }
.modal-body::-webkit-scrollbar { width: 4px; }
.modal-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.file-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 8px;
  cursor: pointer; transition: background .15s;
  font-size: 13px;
}
.file-item:hover { background: var(--s3); }
.file-item.selected { background: rgba(0,229,255,0.07); }
.file-icon { font-size: 15px; flex-shrink: 0; width: 22px; text-align: center; }
.file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
.file-meta {
  font-size: 10px; font-family: var(--mono);
  color: var(--muted); flex-shrink: 0;
}

.modal-footer {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  background: rgba(0,0,0,.2);
}
.modal-selected-path {
  flex: 1;
  font-size: 10px; font-family: var(--mono);
  color: var(--muted2);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.btn-confirm {
  padding: 8px 20px;
  background: linear-gradient(135deg, var(--cyan), var(--green));
  border: none; border-radius: 8px;
  color: #000; font-family: var(--mono);
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  cursor: pointer; transition: opacity .2s;
}
.btn-confirm:hover { opacity: .85; }

.modal-loading {
  display: flex; align-items: center; justify-content: center;
  padding: 40px; gap: 10px;
  color: var(--muted2); font-family: var(--mono); font-size: 11px;
}

/* breadcrumb */
.breadcrumb {
  display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 10px; font-family: var(--mono);
}
.crumb {
  color: var(--cyan); cursor: pointer; padding: 2px 4px; border-radius: 3px;
  transition: background .15s;
}
.crumb:hover { background: rgba(0,229,255,0.1); }
.crumb-sep { color: var(--muted); }
.crumb.current { color: var(--text); cursor: default; }
.crumb.current:hover { background: none; }

/* ══════════════════════════════════════
   EMPTY STATE
══════════════════════════════════════ */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  padding: 40px 20px; gap: 10px;
  color: var(--muted); font-size: 11px; font-family: var(--mono);
  letter-spacing: 1px;
}
.empty-icon { font-size: 28px; opacity: .4; }

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
#toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--s3); border: 1px solid var(--border2);
  color: var(--text); font-family: var(--mono); font-size: 11px;
  letter-spacing: 1px; padding: 10px 20px; border-radius: 10px;
  opacity: 0; transition: all .3s; z-index: 9999;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══════════════════════════════════════
   COPYRIGHT FOOTER
══════════════════════════════════════ */
.footer {
  text-align: center;
  padding: 24px 0 8px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.footer-brand {
  font-family: var(--mono); font-size: 11px;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted);
}
.footer-brand strong {
  background: linear-gradient(120deg, var(--cyan), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.footer-copy {
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 1.5px; color: var(--muted);
  opacity: .5;
}

/* ══════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════ */
@keyframes blink {
  0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--green); }
  50%       { opacity: .4; box-shadow: 0 0 3px var(--green); }
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes ring-pulse {
  0%, 100% { opacity: .8; transform: scale(1); }
  50%       { opacity: .2; transform: scale(1.08); }
}
@keyframes glow-dot {
  0%, 100% { box-shadow: 0 0 10px var(--green), 0 0 20px var(--green); }
  50%       { box-shadow: 0 0 6px var(--cyan),  0 0 12px var(--cyan); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-5px); }
  40%     { transform: translateX(5px); }
  60%     { transform: translateX(-3px); }
  80%     { transform: translateX(3px); }
}
.anim-fadeup { animation: fadeUp .4s ease both; }

/* retry badge */
.retry-badge {
  font-size: 9px; font-family: var(--mono);
  color: var(--yellow); background: rgba(255,209,102,.08);
  border: 1px solid rgba(255,209,102,.2);
  padding: 2px 7px; border-radius: 20px; margin-right: 4px;
}

/* source badge */
.src-badge {
  font-size: 8px; font-family: var(--mono);
  letter-spacing: 1px; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px;
}
.src-direct   { background: rgba(0,229,255,.08); color: var(--cyan2); }
.src-youtube  { background: rgba(255,59,59,.08);  color: #ff3b3b; }
.src-instagram{ background: rgba(168,85,247,.08); color: var(--purple); }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00ff9d"/>
    </linearGradient>
  </defs>
</svg>
<div class="wrap">

  <!-- ── HEADER ── -->
  <header class="anim-fadeup">
    <div class="logo-block">
      <div class="logo-icon">
        <!-- Licher Logo SVG -->
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lg1" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#00e5ff"/>
              <stop offset="100%" stop-color="#00ff9d"/>
            </linearGradient>
            <linearGradient id="lg2" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#00b8d4" stop-opacity="0.3"/>
              <stop offset="100%" stop-color="#00c87a" stop-opacity="0.1"/>
            </linearGradient>
          </defs>
          <rect width="48" height="48" rx="12" fill="url(#lg2)" stroke="url(#lg1)" stroke-width="1"/>
          <!-- Arrow down = download -->
          <path d="M24 10 L24 28" stroke="url(#lg1)" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M16 22 L24 30 L32 22" stroke="url(#lg1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- Cloud/upload arc -->
          <path d="M14 36 Q14 32 18 32 L30 32 Q34 32 34 36" stroke="url(#lg1)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
          <!-- Dots -->
          <circle cx="10" cy="24" r="1.5" fill="#00e5ff" opacity="0.5"/>
          <circle cx="38" cy="24" r="1.5" fill="#00ff9d" opacity="0.5"/>
        </svg>
      </div>
      <div class="logo-text-group">
        <div class="logo-name">Licher</div>
        <div class="logo-tagline">Transfer Engine v2</div>
      </div>
    </div>
    <div class="header-right">
      <div class="status-pill">
        <div class="status-dot"></div>
        Online
      </div>
    </div>
  </header>


  <!-- ── INPUT CARD ── -->
  <div class="card anim-fadeup" style="animation-delay:.1s">
    <div class="card-head">
      <div class="card-head-dot"></div>
      <div class="card-head-title">New Transfer</div>
    </div>
    <div class="card-body">

      <!-- Source Type Tabs -->
      <div class="source-tabs">
        <button class="source-tab active" onclick="setSourceTab('direct')" id="tab-direct">
          ⬇ Direct
        </button>
        <button class="source-tab yt" onclick="setSourceTab('youtube')" id="tab-youtube">

        </button>
        <button class="source-tab ig" onclick="setSourceTab('instagram')" id="tab-instagram">
          ◈ Instagram
        </button>
      </div>

      <!-- URL -->
      <div class="field">
        <div class="field-label">Source URL</div>
        <div class="input-wrap">
          <span class="input-ico">⊕</span>
          <input type="url" id="iUrl" placeholder="https://..." autocomplete="off"
                 oninput="onUrlInput()" onpaste="onUrlPaste(event)">
          <span class="input-action probe-status" id="probeStatus" style="display:none"></span>
        </div>
      </div>

      <!-- Probe Info -->
      <div class="probe-info" id="probeInfo">
        <div class="probe-item">Size: <span id="probeSize">—</span></div>
        <div class="probe-item">Type: <span id="probeType">—</span></div>

      <!-- Quality (yt/ig only) -->

        <button class="q-btn" onclick="setQuality('720p')" id="q-720p">720p</button>

      <!-- Destination -->
      <div class="dest-row">

    </div>

  <!-- ── JOBS CARD ── -->
  <div class="card anim-fadeup" id="jobsCard" style="animation-delay:.15s; display:none">
    <div class="jobs-toolbar">
      <div class="toolbar-title">Transfer Queue</div>
      <button class="btn-sm warn" onclick="deleteCompleted()">Clear Done</button>
      <button class="btn-sm danger" onclick="deleteAll()">Kill All</button>
    </div>
    <div class="jobs-total-strip">
      <div>
        <div class="jobs-total-label">Total Transferred → Mega</div>
        <div class="jobs-total-val" id="grandTotalVal">0 B</div>
      </div>
      <div class="jobs-total-sub" id="grandTotalSub">0 files done</div>
    </div>
    <div class="jobs-list" id="jobsList"></div>
  </div>

  <!-- ── FOOTER ── -->
  <div class="footer">
    <div class="footer-brand">Built by <strong>kop3ma</strong></div>

  </div>

</div><!-- /wrap -->

<!-- ── MEGA BROWSER MODAL ── -->
<div class="modal-overlay" id="megaModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">📁 Mega Cloud</div>

      <button class="btn-modal-close" onclick="closeMegaBrowser()">×</button>

      <div class="modal-loading">

        Loading...
      </div>
    </div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let jobsData    = {};
let openDetails = {};
let pollTimer   = null;
let statTimer   = null;
let selectedQuality = 'best';
let activeSourceTab = 'direct';

// Sparkline history
const DL_HIST = new Array(40).fill(0);
const UL_HIST = new Array(40).fill(0);

const STATUS_COLOR = {
  queued:    'var(--muted2)',
  running:   'var(--cyan)',
  done:      'var(--green)',
  failed:    'var(--red)',
  cancelled: 'var(--yellow)',
};

const STATUS_ICON = {
  queued:    '◌',
  running:   '⟳',
  done:      '✓',
  failed:    '✕',
  cancelled: '⊘',
};

const SRC_ICONS = {
  direct:    '⬇',
  youtube:   '▶',
  instagram: '◈',
};

// ═══════════════════════════════════════════
// API
// ═══════════════════════════════════════════
async function api(path, methodOrBody = 'GET', body = null) {
  let method = methodOrBody;
  let opts = { method };
  if (typeof methodOrBody === 'object' && methodOrBody !== null) {
    // api(path, {json}) shorthand → POST with JSON body
    opts = { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(methodOrBody) };
  } else if (body !== null) {
    opts.headers = {'Content-Type':'application/json'};
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ═══════════════════════════════════════════
// SOURCE TABS
// ═══════════════════════════════════════════
function setSourceTab(tab) {
  activeSourceTab = tab;
  ['direct','youtube','instagram'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t === tab);
  });
  const qr = document.getElementById('qualityRow');
  if (tab === 'youtube' || tab === 'instagram') {
    qr.classList.add('visible');
  } else {
    qr.classList.remove('visible');
  }
}

// ═══════════════════════════════════════════
// QUALITY
// ═══════════════════════════════════════════
function setQuality(q) {
  selectedQuality = q;
  document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('q-'+q).classList.add('active');
}

// ═══════════════════════════════════════════
// URL INPUT / PROBE
// ═══════════════════════════════════════════
let probeTimer = null;
function onUrlInput() {
  const url = document.getElementById('iUrl').value.trim();
  // auto-detect tab
  if (url.includes('youtube.com') || url.includes('youtu.be')) {
    setSourceTab('youtube');
  } else if (url.includes('instagram.com')) {
    setSourceTab('instagram');
  }
  // auto-probe after pause
  clearTimeout(probeTimer);
  const status = document.getElementById('probeStatus');
  if (!url) {
    document.getElementById('probeInfo').classList.remove('visible');
    status.style.display = 'none';
    return;
  }
  status.style.display = 'inline';
  status.textContent = '…';
  probeTimer = setTimeout(probeUrl, 800);
}

function onUrlPaste(e) {
  setTimeout(onUrlInput, 50);
}

async function probeUrl() {
  const url = document.getElementById('iUrl').value.trim();
  if (!url) return;
  const info = document.getElementById('probeInfo');
  const status = document.getElementById('probeStatus');
  info.classList.remove('visible');
  try {
    const data = await api('/probe?url=' + encodeURIComponent(url));
    if (data.ok) {
      document.getElementById('probeSize').textContent = data.size ? fmtBytes(data.size) : '—';
      document.getElementById('probeType').textContent = data.content_type || '—';
      document.getElementById('probeSrc').textContent  = data.source_type || 'direct';
      if (data.source_type === 'youtube') setSourceTab('youtube');
      if (data.source_type === 'instagram') setSourceTab('instagram');
      info.classList.add('visible');
      status.textContent = '✓';
      setTimeout(() => { status.style.display = 'none'; }, 1500);
    } else {
      status.textContent = '—';
      setTimeout(() => { status.style.display = 'none'; }, 1500);
    }
  } catch(e) {
    status.style.display = 'none';
  }
}

// ═══════════════════════════════════════════
// START TRANSFER
// ═══════════════════════════════════════════
async function startTransfer() {
  const url  = document.getElementById('iUrl').value.trim();
  const file = document.getElementById('iFile').value.trim();
  const dest = document.getElementById('iDest').value.trim() || 'mega:/Video';
  const btn  = document.getElementById('startBtn');

  if (!url || !file) { shake(btn); toast('⚠ Fill in URL and filename'); return; }

  btn.disabled = true; btn.classList.add('loading');

  try {
    const form = new FormData();
    form.append('url', url);
    form.append('filename', file);
    form.append('dest', dest);
    form.append('quality', selectedQuality);

    const data = await fetch('/start', { method: 'POST', body: form }).then(r => r.json());
    if (data.error) { toast('✕ ' + data.error); return; }

    document.getElementById('iUrl').value  = '';
    document.getElementById('iFile').value = '';
    document.getElementById('probeInfo').classList.remove('visible');

    toast('✓ Transfer queued');
    showJobsCard();
    startPolling();
    startStatPolling();

  } catch(e) { toast('✕ Network error'); }
  finally    { btn.disabled = false; btn.classList.remove('loading'); }
}

// ═══════════════════════════════════════════
// POLLING
// ═══════════════════════════════════════════
function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(loadJobs, 2000);
}
function stopPolling() { clearInterval(pollTimer); pollTimer = null; }

function startStatPolling() {
  if (statTimer) return;
  statTimer = setInterval(loadStats, 1500);
}
function stopStatPolling() { clearInterval(statTimer); statTimer = null; }

async function loadJobs() {
  try {
    const data = await api('/jobs');
    Object.assign(jobsData, data);
    for (const id of Object.keys(jobsData)) {
      if (!data[id]) delete jobsData[id];
    }
    renderJobs();
    const hasActive = Object.values(data).some(j => j.status === 'queued' || j.status === 'running');
    if (!hasActive) stopPolling();
  } catch(e) {}
}

async function loadStats() {
  try {
    const data = await api('/stats');
    const gtVal = document.getElementById('grandTotalVal');
    if (gtVal) gtVal.textContent = fmtBytes(data.total_uploaded_bytes || 0);
    const gtSub = document.getElementById('grandTotalSub');
    if (gtSub) gtSub.textContent = `${data.jobs_done || 0} file${(data.jobs_done||0) !== 1 ? 's' : ''} done`;
  } catch(e) {}
}

// ═══════════════════════════════════════════
// RENDER JOBS
// ═══════════════════════════════════════════
function renderJobs() {
  const list = document.getElementById('jobsList');
  const entries = Object.entries(jobsData).reverse();

  if (!entries.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">⊘</div>No transfers yet</div>';
    document.getElementById('jobsCard').style.display = 'none';
    return;
  }
  showJobsCard();

  const newIds = new Set(entries.map(([id]) => id));
  for (const el of list.querySelectorAll('.job-item')) {
    if (!newIds.has(el.dataset.id)) el.remove();
  }

  for (const [id, job] of entries) {
    let item = list.querySelector(`.job-item[data-id="${id}"]`);
    if (!item) {
      item = buildJobItem(id, job);
      list.insertBefore(item, list.firstChild);
    } else {
      updateJobItem(item, id, job);
    }
  }

  // grand total: sum filesize of all done jobs
  // We track this from session_stats (total_uploaded_bytes) which worker already counts
  // Just update the done count here
  const doneJobs = entries.filter(([,j]) => j.status === 'done');
  const gtSub = document.getElementById('grandTotalSub');
  if (gtSub) gtSub.textContent = `${doneJobs.length} file${doneJobs.length !== 1 ? 's' : ''} done`;
}

function buildJobItem(id, job) {
  const div = document.createElement('div');
  div.className = `job-item is-${job.status}`;
  div.dataset.id = id;
  div.innerHTML = jobItemHTML(id, job);
  return div;
}

function jobItemHTML(id, job) {
  const pct    = Math.min(100, Math.max(0, job.progress || 0));
  const open   = openDetails[id] ? 'open' : '';
  const src    = job.source_type || 'direct';
  const icon   = STATUS_ICON[job.status] || '?';

  // circular SVG math
  const R  = 22; // radius
  const C  = 2 * Math.PI * R; // circumference ~138.2
  const dash = C;
  const offset = C - (pct / 100) * C;

  // transfer display
  const recvStr  = job.downloaded_str || job.filesize_str || '';
  const totalStr = job.filesize_str   || '';
  let transferLine = '';
  if (job.status === 'running' || job.status === 'done') {
    if (recvStr && totalStr && recvStr !== totalStr) {
      transferLine = `<div class="job-transfer-row">
        <span class="job-recv">${esc(recvStr)}</span>
        <span class="job-sep">/</span>
        <span class="job-total">${esc(totalStr)}</span>
      </div>`;
    } else if (totalStr) {
      transferLine = `<div class="job-transfer-row"><span class="job-recv">${esc(totalStr)}</span></div>`;
    }
  }

  // speed + eta
  const metaParts = [];
  if (job.speed) metaParts.push(`<span class="job-speed">⚡ ${esc(job.speed)}</span>`);
  if (job.eta)   metaParts.push(`<span class="job-eta">⏱ ${esc(job.eta)}</span>`);
  metaParts.push(`<span class="job-src-badge">${SRC_ICONS[src]||'⬇'} ${src}</span>`);
  const metaLine = `<div class="job-meta-row">${metaParts.join('')}</div>`;

  const retryBadge = job.retries > 0
    ? `<span class="retry-badge-inline">↻ ${job.retries}/${5}</span>`
    : '';

  // circle pct label
  const circleLabel = job.status === 'queued' ? '…'
    : job.status === 'done'      ? '✓'
    : job.status === 'failed'    ? '✕'
    : job.status === 'cancelled' ? '—'
    : `${pct.toFixed(0)}%`;

  const circleStatusLabel = job.status === 'running' ? 'xfer'
    : job.status === 'queued' ? 'wait' : '';

  return `
    <div class="job-row" onclick="toggleDetail('${id}')">
      <div class="job-status-icon ${job.status}">${icon}</div>
      <div class="job-info">
        <div class="job-name">${esc(job.filename || id.slice(0,12))}</div>
        ${transferLine}
        ${metaLine}
      </div>
      <div class="job-circle-wrap">
        <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
          <circle class="job-circle-track" cx="28" cy="28" r="${R}"/>
          <circle class="job-circle-fill"  cx="28" cy="28" r="${R}"
            stroke-dasharray="${dash.toFixed(2)}"
            stroke-dashoffset="${offset.toFixed(2)}"/>
        </svg>
        <div class="job-circle-label">
          <span class="job-circle-pct">${circleLabel}</span>
          ${circleStatusLabel ? `<span class="job-circle-status">${circleStatusLabel}</span>` : ''}
        </div>
      </div>
    </div>
    <div class="job-badge-row">
      <span class="job-badge b-${job.status}">${job.status}</span>
      ${retryBadge}
    </div>
    <div class="job-progress">
      <div class="job-progress-fill" style="width:${pct}%"></div>
    </div>
    <div class="job-detail ${open}">
      <div class="job-actions">
        ${job.status === 'running' || job.status === 'queued'
          ? `<button class="btn-sm danger stop-btn" onclick="cancelJob('${id}');event.stopPropagation()">⏹ Stop</button>`
          : ''}
        <button class="btn-sm danger" onclick="event.stopPropagation();deleteJob('${id}')">🗑 Delete</button>
        <button class="btn-sm" onclick="event.stopPropagation();copyLog('${id}')">⎘ Copy Log</button>
        ${job.started_at ? `<span class="job-time-info">▸ ${job.started_at}${job.finished_at ? ' · ✓ '+job.finished_at : ''}</span>` : ''}
      </div>
      <div class="log-wrap">
        <div class="log-bar"><span class="log-bar-title">⬛ Output Log</span></div>
        <div class="log-out" id="log-${id}">${renderLogHTML(job.log)}</div>
      </div>
    </div>`;
}

function updateJobItem(item, id, job) {
  item.className = `job-item is-${job.status}`;

  // status icon
  const icon = item.querySelector('.job-status-icon');
  if (icon) {
    icon.className = `job-status-icon ${job.status}`;
    icon.textContent = STATUS_ICON[job.status] || '?';
  }

  // filename (shouldn't change but just in case)
  const nameEl = item.querySelector('.job-name');
  if (nameEl) nameEl.textContent = job.filename || id.slice(0,12);

  // transfer amounts
  const recvStr  = job.downloaded_str || job.filesize_str || '';
  const totalStr = job.filesize_str   || '';
  let xferEl = item.querySelector('.job-transfer-row');
  if (job.status === 'running' || job.status === 'done') {
    if (!xferEl) {
      xferEl = document.createElement('div');
      xferEl.className = 'job-transfer-row';
      const nameNode = item.querySelector('.job-name');
      if (nameNode) nameNode.insertAdjacentElement('afterend', xferEl);
    }
    if (recvStr && totalStr && recvStr !== totalStr) {
      xferEl.innerHTML = `<span class="job-recv">${esc(recvStr)}</span><span class="job-sep"> / </span><span class="job-total">${esc(totalStr)}</span>`;
    } else if (totalStr) {
      xferEl.innerHTML = `<span class="job-recv">${esc(totalStr)}</span>`;
    }
  }

  // speed + eta
  const metaEl = item.querySelector('.job-meta-row');
  if (metaEl) {
    const src = job.source_type || 'direct';
    const parts = [];
    if (job.speed) parts.push(`<span class="job-speed">⚡ ${esc(job.speed)}</span>`);
    if (job.eta)   parts.push(`<span class="job-eta">⏱ ${esc(job.eta)}</span>`);
    parts.push(`<span class="job-src-badge">${SRC_ICONS[src]||'⬇'} ${src}</span>`);
    metaEl.innerHTML = parts.join('');
  }

  // circular progress
  const pct = Math.min(100, Math.max(0, job.progress || 0));
  const R = 22;
  const C = 2 * Math.PI * R;
  const offset = C - (pct / 100) * C;
  const fillCircle = item.querySelector('.job-circle-fill');
  if (fillCircle) {
    fillCircle.setAttribute('stroke-dasharray', C.toFixed(2));
    fillCircle.setAttribute('stroke-dashoffset', offset.toFixed(2));
  }
  const pctLabel = item.querySelector('.job-circle-pct');
  if (pctLabel) {
    pctLabel.textContent = job.status === 'queued' ? '…'
      : job.status === 'done'      ? '✓'
      : job.status === 'failed'    ? '✕'
      : job.status === 'cancelled' ? '—'
      : `${pct.toFixed(0)}%`;
  }

  // thin progress bar
  const bar = item.querySelector('.job-progress-fill');
  if (bar) bar.style.width = pct + '%';

  // badge
  const badge = item.querySelector('.job-badge');
  if (badge) { badge.className = `job-badge b-${job.status}`; badge.textContent = job.status; }

  // retry
  const retryEl = item.querySelector('.retry-badge-inline');
  if (job.retries > 0) {
    if (retryEl) retryEl.textContent = `↻ ${job.retries}/${5}`;
  } else if (retryEl) retryEl.remove();

  // log
  const logEl = item.querySelector(`#log-${id}`);
  if (logEl && openDetails[id]) {
    logEl.innerHTML = renderLogHTML(job.log);
    logEl.scrollTop = logEl.scrollHeight;
  }

  // stop button
  const actions = item.querySelector('.job-actions');
  if (actions) {
    const stopBtn = actions.querySelector('.stop-btn');
    if (job.status === 'running' || job.status === 'queued') {
      if (!stopBtn) {
        const btn = document.createElement('button');
        btn.className = 'btn-sm danger stop-btn';
        btn.textContent = '⏹ Stop';
        btn.onclick = (e) => { e.stopPropagation(); cancelJob(id); };
        actions.insertBefore(btn, actions.firstChild);
      }
    } else {
      if (stopBtn) stopBtn.remove();
    }
  }
}

function renderLogHTML(log) {
  if (!log) return '';
  return log.split('\n').map(line => {
    const e = esc(line);
    if (/error|failed|critical/i.test(line))  return `<span class="le">${e}</span>`;
    if (/warn|notice/i.test(line))             return `<span class="lw">${e}</span>`;
    if (/✓|complete|done|100%/i.test(line))   return `<span class="lo">${e}</span>`;
    if (/retrying|retry/i.test(line))         return `<span class="lr">${e}</span>`;
    return e;
  }).join('\n');
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
function toggleDetail(id) {
  openDetails[id] = !openDetails[id];
  const item = document.querySelector(`.job-item[data-id="${id}"]`);
  if (!item) return;
  const detail = item.querySelector('.job-detail');
  if (detail) {
    detail.classList.toggle('open', openDetails[id]);
    if (openDetails[id]) {
      const logEl = item.querySelector(`#log-${id}`);
      if (logEl) logEl.scrollTop = logEl.scrollHeight;
    }
  }
}

async function cancelJob(id) {
  await api(`/cancel/${id}`, 'POST');
  toast('Transfer stopped');
  loadJobs();
}

async function deleteJob(id) {
  await api(`/delete/${id}`, 'POST');
  delete jobsData[id];
  delete openDetails[id];
  toast('Job deleted');
  renderJobs();
}

async function deleteCompleted() {
  const data = await api('/delete-completed', 'POST');
  toast(`Cleared ${data.removed} job(s)`);
  await loadJobs();
}

async function deleteAll() {
  if (!confirm('Delete ALL jobs?')) return;
  await api('/delete-all', 'POST');
  for (const k of Object.keys(jobsData)) delete jobsData[k];
  toast('All jobs cleared');
  renderJobs();
}

function copyLog(id) {
  const el = document.getElementById(`log-${id}`);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => toast('Log copied'));
}

// ═══════════════════════════════════════════
// MEGA BROWSER
// ═══════════════════════════════════════════
let megaCurrentPath = 'mega:/';
let megaPathStack   = ['mega:/'];
let megaSelected    = '';

async function openMegaBrowser() {
  megaCurrentPath = 'mega:/';
  megaPathStack   = ['mega:/'];
  megaSelected    = '';
  document.getElementById('megaModal').classList.add('open');
  await loadMegaDir('mega:/');
}

function closeMegaBrowser() {
  document.getElementById('megaModal').classList.remove('open');
}

async function loadMegaDir(path) {
  megaCurrentPath = path;
  document.getElementById('modalPath').textContent = path;
  document.getElementById('modalBody').innerHTML =
    `<div class="modal-loading"><div class="spin" style="display:block;border-color:rgba(0,229,255,.2);border-top-color:var(--cyan)"></div> Loading...</div>`;
  renderBreadcrumb();

  try {
    const data = await api('/mega/ls?path=' + encodeURIComponent(path));
    if (!data.ok) {
      document.getElementById('modalBody').innerHTML =
        `<div class="empty-state"><div class="empty-icon">✕</div>${esc(data.error||'Failed to load')}</div>`;
      return;
    }
    renderMegaItems(data.items, path);
  } catch(e) {
    document.getElementById('modalBody').innerHTML =
      `<div class="empty-state"><div class="empty-icon">✕</div>Connection error</div>`;
  }
}

function renderMegaItems(items, basePath) {
  const body = document.getElementById('modalBody');
  if (!items || !items.length) {
    body.innerHTML = '<div class="empty-state"><div class="empty-icon">◌</div>Empty folder</div>';
    return;
  }

  // sort: folders first
  items.sort((a,b) => {
    if (a.IsDir && !b.IsDir) return -1;
    if (!a.IsDir && b.IsDir) return 1;
    return a.Name.localeCompare(b.Name);
  });

  body.innerHTML = '';
  for (const item of items) {
    const el = document.createElement('div');
    el.className = 'file-item';
    const icon = item.IsDir ? '📁' : getFileIcon(item.Name);
    const size = item.IsDir ? '' : fmtBytes(item.Size || 0);
    const fullPath = basePath.replace(/\/$/, '') + '/' + item.Name;

    el.innerHTML = `
      <div class="file-icon">${icon}</div>
      <div class="file-name">${esc(item.Name)}</div>
      <div class="file-meta">${size}</div>
      ${item.IsDir ? '<div class="file-meta" style="color:var(--cyan);font-size:9px">▶</div>' : ''}
    `;

    if (item.IsDir) {
      el.onclick = () => {
        megaPathStack.push(fullPath);
        megaSelected = fullPath;
        document.getElementById('modalSelectedPath').textContent = fullPath;
        loadMegaDir(fullPath);
      };
    } else {
      el.onclick = () => {
        document.querySelectorAll('.file-item').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        megaSelected = basePath.replace(/\/$/, '');
        document.getElementById('modalSelectedPath').textContent = megaSelected;
      };
    }
    body.appendChild(el);
  }
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const parts = megaCurrentPath.replace('mega:/', '').split('/').filter(Boolean);
  let html = `<span class="crumb" onclick="jumpToRoot()">mega:/</span>`;
  let built = 'mega:/';
  for (let i = 0; i < parts.length; i++) {
    built = built.replace(/\/$/, '') + '/' + parts[i];
    const p = built;
    const isCurrent = i === parts.length - 1;
    html += `<span class="crumb-sep">/</span>`;
    if (isCurrent) {
      html += `<span class="crumb current">${esc(parts[i])}</span>`;
    } else {
      html += `<span class="crumb" onclick="jumpTo('${esc(p)}')">${esc(parts[i])}</span>`;
    }
  }
  bc.innerHTML = html;
}

function jumpToRoot() {
  megaPathStack = ['mega:/'];
  loadMegaDir('mega:/');
}
function jumpTo(path) {
  loadMegaDir(path);
}

function confirmMegaPath() {
  const sel = megaSelected || megaCurrentPath;
  if (sel) {
    document.getElementById('iDest').value = sel.replace(/\/$/, '');
    toast('✓ Destination set: ' + sel);
  }
  closeMegaBrowser();
}

async function createMegaFolder() {
  const base = (megaSelected || megaCurrentPath).replace(/\/$/, '');
  const name = prompt('New folder name:');
  if (!name || !name.trim()) return;
  const newPath = base + '/' + name.trim();
  try {
    const data = await api('/mega/mkdir', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({path: newPath})
    });
    if (data.ok) {
      toast('✓ Folder created: ' + name.trim());
      await loadMegaDir(megaCurrentPath);
    } else {
      toast('✕ ' + (data.error || 'Failed to create folder'));
    }
  } catch(e) { toast('✕ Network error'); }
}

function getFileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const icons = {
    mp4:'🎬', mkv:'🎬', avi:'🎬', mov:'🎬', webm:'🎬',
    mp3:'🎵', m4a:'🎵', flac:'🎵', wav:'🎵',
    jpg:'🖼', jpeg:'🖼', png:'🖼', gif:'🖼', webp:'🖼',
    pdf:'📄', zip:'📦', rar:'📦', '7z':'📦',
    txt:'📝', srt:'📝',
  };
  return icons[ext] || '📄';
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function fmtBytes(n) {
  if (n < 1024)          return n + ' B';
  if (n < 1024**2)       return (n/1024).toFixed(1) + ' KB';
  if (n < 1024**3)       return (n/1024**2).toFixed(1) + ' MB';
  return (n/1024**3).toFixed(2) + ' GB';
}

function fmtSpeed(n) {
  if (n < 1024)     return n.toFixed(0) + ' B';
  if (n < 1024**2)  return (n/1024).toFixed(1) + ' K';
  if (n < 1024**3)  return (n/1024**2).toFixed(1) + ' M';
  return (n/1024**3).toFixed(2) + ' G';
}

function showJobsCard() {
  document.getElementById('jobsCard').style.display = '';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

function shake(el) {
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = 'shake .3s ease';
  setTimeout(() => el.style.animation = '', 400);
}

// ── Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('megaModal').classList.contains('open')) {
    startTransfer();
  }
  if (e.key === 'Escape') closeMegaBrowser();
});

// ── Click outside modal
document.getElementById('megaModal').addEventListener('click', function(e) {
  if (e.target === this) closeMegaBrowser();
});

// ── Init
(async () => {
  try {
    const data = await api('/jobs');
    if (Object.keys(data).length) {
      Object.assign(jobsData, data);
      showJobsCard(); renderJobs();
      const hasActive = Object.values(data).some(j => j.status === 'queued' || j.status === 'running');
      if (hasActive) startPolling();
    }
  } catch(_) {}
  startStatPolling();
})();
</script>
